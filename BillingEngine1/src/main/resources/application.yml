server:
  port: 8080

spring:
  application:
    name: billing-engine
  main:
    allow-bean-definition-overriding: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  info:
    title: Billing Engine API
    version: v1
    description: Policy Billing and Collections Microservice

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.insurance.billing: DEBUG
